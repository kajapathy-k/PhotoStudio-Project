apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-deployment-hpa
  namespace: photostudio-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: photostudio-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5
          
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15

    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 15

      

